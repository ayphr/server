name: Pull Request
description: Propose a new change
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the changes.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API
        - Database
        - Workers
        - Other
    validations:
      required: true
